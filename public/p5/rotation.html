<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rotation — Sine & Cosine</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      overflow: hidden;
      font-family: sans-serif;
    }

    .controls {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(255,255,255,0.06);
      padding: 12px 14px;
      border-radius: 8px;
      backdrop-filter: blur(6px);
      color: #ddd;
      font-size: 12px;
    }

    .controls label {
      display: block;
      margin-top: 6px;
    }

    .controls input {
      width: 140px;
    }

    .controls button {
      margin-top: 10px;
      width: 100%;
      padding: 6px;
      border: none;
      border-radius: 6px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      cursor: pointer;
      font-size: 12px;
    }

    .controls button:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>

<body>

<div class="controls">
  <label>Speed: <span id="speedVal">1</span></label>
  <input type="range" id="speed" min="0.1" max="5" step="0.1" value="0.5">

  <label>Radius: <span id="radiusVal">25</span></label>
  <input type="range" id="radius" min="50" max="200" step="5" value="100">

  <button id="resetBtn">Reset</button>
</div>

<script>

let radius = 25;
let angle = 0;
let speed = 1;

let waveX = [];
let waveY = [];

function setup() {
  createCanvas(600, 600);
}

function draw() {
  background(20);

  translate(width / 2, height / 2);
  angleMode(DEGREES);

  // Circle
  fill(50, 50, 150, 30);
  stroke(100, 100, 255, 150);
  strokeWeight(1.5);
  circle(0, 0, 2 * radius);

  // Axes
  stroke(80, 80, 80, 200);
  strokeWeight(1);
  line(-400, 0, 400, 0);
  line(0, -400, 0, 400);

  let x = radius * cos(angle);
  let y = radius * sin(angle);

  // Cosine projection
  stroke(0, 180, 255);
  strokeWeight(2.5);
  line(x, 0, x, y);
  strokeWeight(2);
  stroke('white');
  point(x, 0);

  // Sine projection
  stroke(255, 150, 0);
  strokeWeight(2.5);
  line(0, y, x, y);
  strokeWeight(2);
  stroke('white');
  point(0, y);

  // Radius vector
  push();
  stroke(255, 70, 70);
  drawingContext.setLineDash([4, 6]);
  line(0, 0, x, y);
  strokeWeight(10);
  point(x, y);
  pop();

  // Store values
  waveX.push(x);
  waveY.push(y);

  if (waveX.length > 1200) {
    waveX.shift();
    waveY.shift();
  }

  // Sine wave
  push();
  translate(radius, 0);
  stroke(255, 150, 0);
  noFill();
  beginShape();
  for (let i = 0; i < waveY.length; i++) {
    vertex(i * 0.5, waveY[i]);
  }
  endShape();
  pop();

  // Cosine wave
  push();
  translate(0, radius);
  stroke(0, 180, 255);
  noFill();
  beginShape();
  for (let i = 0; i < waveX.length; i++) {
    vertex(waveX[i], i * 0.5);
  }
  endShape();
  pop();

  angle += speed;
}

/* ─── Controls ───────────────────────── */

const speedSlider = document.getElementById("speed");
const radiusSlider = document.getElementById("radius");
const resetBtn = document.getElementById("resetBtn");

const speedVal = document.getElementById("speedVal");
const radiusVal = document.getElementById("radiusVal");

speedSlider.addEventListener("input", () => {
  speed = parseFloat(speedSlider.value);
  speedVal.innerText = speed;
});

radiusSlider.addEventListener("input", () => {
  radius = parseFloat(radiusSlider.value);
  radiusVal.innerText = radius;

  waveX = [];
  waveY = [];
});

/* ─── Reset Button ───────────────────── */

resetBtn.addEventListener("click", () => {
  angle = 0;
  speed = 0.5;
  radius = 100;

  waveX = [];
  waveY = [];

  speedSlider.value = speed;
  radiusSlider.value = radius;

  speedVal.innerText = speed;
  radiusVal.innerText = radius;
});

</script>

</body>
</html>
